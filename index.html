<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Giải Phẫu Hệ Hô Hấp</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e0f7fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #game-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 600px; }
        h1 { color: #00796b; text-align: center; }
        .question { font-size: 1.2rem; margin-bottom: 1.5rem; font-weight: bold; color: #333; }
        .options { display: grid; gap: 10px; }
        button { padding: 12px; border: 2px solid #00acc1; background: white; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 1rem; text-align: left; }
        button:hover { background: #e0f2f1; border-color: #00796b; }
        button.correct { background-color: #c8e6c9; border-color: #4caf50; color: #2e7d32; }
        button.wrong { background-color: #ffcdd2; border-color: #f44336; color: #c62828; }
        #score-area { text-align: center; display: none; }
        .progress { margin-bottom: 10px; color: #666; font-size: 0.9rem; }
        #next-btn { margin-top: 20px; width: 100%; background: #00796b; color: white; border: none; padding: 15px; display: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="quiz-area">
        <div class="progress" id="progress">Câu hỏi 1/10</div>
        <div class="question" id="question">Đang tải câu hỏi...</div>
        <img src="hinh/hinh.jpg" id = "hinh" width="400px"/>
        <div class="options" id="options"></div>
        <button id="next-btn">Tiếp theo</button>
    </div>

    <div id="score-area">
        <h2>Hoàn thành!</h2>
        <p id="final-score"></p>
        <button onclick="location.reload()" style="background: #00796b; color: white; width: auto; padding: 10px 20px;">Chơi lại</button>
    </div>
</div>

<script>
    const quizData = [
        { q: "Cơ quan nào sau đây được mệnh danh là 'ngã ba' của hệ hô hấp và tiêu hóa?", a: ["Thanh quản", "Hầu (Họng)", "Khí quản", "Phế quản"], c: 1, img: "hinh 1.jpg" },
        { q: "Đơn vị cấu tạo nhỏ nhất của phổi, nơi diễn ra trao đổi khí là gì?", a: ["Tiểu phế quản", "Niêm mạc", "Phế nang", "Màng phổi"], c: 2, img: "hinh 2.jpg" },
        { q: "Khi chúng ta hít vào, cơ hoành sẽ chuyển động như thế nào?", a: ["Co lại và hạ xuống", "Dãn ra và nâng lên", "Không di chuyển", "Thu nhỏ lại"], c: 0, img: "hinh 3.jpg" },
        { q: "Chất khí nào chiếm tỉ lệ lớn nhất trong không khí ta hít vào?", a: ["Oxy", "Cacbonic", "Nitơ", "Argon"], c: 2, img: "hinh 4.jpg" },
        { q: "Bộ phận nào giúp ngăn thức ăn không rơi vào đường hô hấp khi nuốt?", a: ["Dây thanh quản", "Nắp thanh quản", "Lưỡi gà", "Amidan"], c: 1, img: "hinh 1.jpg" },
        { q: "Phổi phải của người thường có bao nhiêu thùy?", a: ["1 thùy", "2 thùy", "3 thùy", "4 thùy"], c: 2 , img: "hinh 1.jpg"},
        { q: "Lớp màng bao bọc bên ngoài phổi được gọi là gì?", a: ["Màng tim", "Màng bụng", "Màng phổi", "Màng xương"], c: 2 , img: "hinh 1.jpg"},
        { q: "Chức năng chính của hệ hô hấp là gì?", a: ["Vận chuyển chất dinh dưỡng", "Cung cấp Oxy và loại bỏ CO2", "Điều hòa thân nhiệt", "Tiêu hóa thức ăn"], c: 1, img: "hinh 1.jpg" },
        { q: "Đâu là bộ phận thuộc đường hô hấp dưới?", a: ["Mũi", "Họng", "Thanh quản", "Khí quản"], c: 3, img: "hinh 1.jpg" },
        { q: "Trong máu, Oxy chủ yếu được vận chuyển bởi?", a: ["Bạch cầu", "Tiểu cầu", "Huyết tương", "Hồng cầu (Hemoglobin)"], c: 3, img: "hinh 1.jpg" }
    ];

    let currentIdx = 0;
    let score = 0;
    let answered = false;

    const questionEl = document.getElementById('question');
    const hinhEl = document.getElementById('hinh');
    const optionsEl = document.getElementById('options');
    const progressEl = document.getElementById('progress');
    const nextBtn = document.getElementById('next-btn');

    function loadQuiz() {
        answered = false;
        nextBtn.style.display = 'none';
        const currentQuiz = quizData[currentIdx];
        progressEl.innerText = `Câu hỏi ${currentIdx + 1}/${quizData.length}`;
        questionEl.innerText = currentQuiz.q;
        hinhEl.src = "hinh/" + currentQuiz.img; 
        optionsEl.innerHTML = '';

        currentQuiz.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn);
            optionsEl.appendChild(btn);
        });
    }

    function checkAnswer(selected, btn) {
        if(answered) return;
        answered = true;
        const correct = quizData[currentIdx].c;
        
        if(selected === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            optionsEl.children[correct].classList.add('correct');
        }
        nextBtn.style.display = 'block';
    }

    nextBtn.onclick = () => {
        currentIdx++;
        if(currentIdx < quizData.length) {
            loadQuiz();
        } else {
            document.getElementById('quiz-area').style.display = 'none';
            const scoreArea = document.getElementById('score-area');
            scoreArea.style.display = 'block';
            document.getElementById('final-score').innerText = `Bạn trả lời đúng ${score}/${quizData.length} câu!`;
        }
    };

    loadQuiz();
</script>
</body>
</html>
